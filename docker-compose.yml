# 本地开发用 Postgres（可选）。生产用 CloudBase Postgres，无需此文件。
# 用法：docker compose up -d  然后  pnpm -F backend prisma:migrate  再  pnpm -F backend db:seed
services:
  postgres:
    image: postgres:16-alpine
    container_name: pandaking9-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pandaking9
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pandaking9"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
